<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/en/a/ae/President_University_Logo.png" />
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/en/a/ae/President_University_Logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>EnglishUp</title>

  <body class="bg-slate-50 m-0 text-slate-900 font-sans antialiased dark:bg-slate-900 dark:text-slate-100 transition-colors duration-200 min-h-screen overflow-x-hidden">
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
          }
        });
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
